services:
  db:
    image: postgres:15-alpine
    container_name: sgapro_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_pass}
      POSTGRES_DB: ${DB_NAME:-sga_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./data/db:/var/lib/postgresql/data
    networks:
      - sga_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sgapro_app
    restart: always
    ports:
      - "3030:3030"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - NODE_ENV=production
      - RECAPTCHA_SITE_KEY=${RECAPTCHA_SITE_KEY}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}
    networks:
      - sga_net

networks:
  sga_net:
    driver: bridge
